<!DOCTYPE html>
<html lang="fr" style="color-scheme:dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AZF AUTO — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-family: 'Inter', sans-serif; }
    body { margin: 0; background: #0d0d0d; color: #e8e6e4; min-height: 100vh; overflow-x: hidden; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 60% 30%, rgba(192,15,8,0.12) 0%, transparent 60%), #0d0d0d;
    }
    .login-card {
      width: 100%; max-width: 380px; background: #111; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.40), 0 2px 8px rgba(0,0,0,0.20);
    }
    .login-logo {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.75rem; font-weight: 800;
      letter-spacing: -0.01em; margin: 0 0 6px; color: #fff;
    }
    .login-logo span { color: #c00f08; }

    /* ── App layout ── */
    #app { display: none; }

    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(13,13,13,0.97); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 800; color: #fff; letter-spacing: -0.01em; text-decoration: none; }
    .topbar-logo span { color: #c00f08; }

    .main-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600;
      padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; transition: all 180ms ease;
      text-decoration: none; letter-spacing: 0.01em;
    }
    .btn-red   { background: #c00f08; color: #fff; box-shadow: 0 2px 6px rgba(192,15,8,0.40); }
    .btn-red:hover   { background: #8b0905; transform: translateY(-1px); }
    .btn-red:active  { background: #5a0603; transform: none; }
    .btn-ghost { background: transparent; color: rgba(255,255,255,0.60); border: 1px solid rgba(255,255,255,0.12); }
    .btn-ghost:hover { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.25); }
    .btn-danger { background: transparent; color: #ff5f58; border: 1px solid rgba(255,95,88,0.25); }
    .btn-danger:hover { background: rgba(255,95,88,0.10); border-color: rgba(255,95,88,0.50); }
    .btn-sm { padding: 6px 12px; font-size: 0.8125rem; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.40); font-weight: 600; margin-bottom: 7px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: #1c1c1c; border: 1px solid rgba(255,255,255,0.10);
      color: #e8e6e4; font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 400;
      padding: 10px 12px; border-radius: 8px; transition: border-color 200ms ease;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.20); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: rgba(192,15,8,0.60); }
    .form-select { appearance: none; cursor: pointer; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='rgba(255,255,255,0.35)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; background-color: #1c1c1c; }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ── Image upload ── */
    .img-upload-zone { border:1.5px dashed rgba(255,255,255,.15); border-radius:10px; padding:18px; transition:border-color 200ms,background 200ms; }
    .img-upload-zone.drag-over { border-color:rgba(192,15,8,.6); background:rgba(192,15,8,.04); }
    .img-preview-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px; }
    .img-preview-item { position:relative; width:90px; height:68px; border-radius:7px; overflow:hidden; background:#1c1c1c; flex-shrink:0; }
    .img-preview-item img { width:100%; height:100%; object-fit:cover; display:block; }
    .img-preview-item .img-remove-btn { position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.75); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; padding:0; opacity:0; transition:opacity 150ms; }
    .img-preview-item:hover .img-remove-btn { opacity:1; }
    .img-upload-trigger { display:inline-flex; align-items:center; gap:6px; font-size:.8125rem; font-weight:600; color:rgba(255,255,255,.45); cursor:pointer; padding:8px 14px; border:1px solid rgba(255,255,255,.12); border-radius:7px; transition:color 150ms,border-color 150ms,background 150ms; user-select:none; position:relative; }
    .img-upload-trigger:hover { color:#fff; border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.04); }
    .img-upload-status { font-size:.8rem; color:rgba(255,255,255,.3); margin-top:8px; min-height:1.2em; }
    .img-upload-status.uploading { color:#f0c040; }
    .img-upload-status.error { color:#ff7b75; }

    /* ── Car table / cards ── */
    .car-table { width: 100%; border-collapse: collapse; }
    .car-table thead th {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.30); font-weight: 600; padding: 12px 14px; text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07); white-space: nowrap;
    }
    .car-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 150ms ease; }
    .car-table tbody tr:hover { background: rgba(255,255,255,0.03); }
    .car-table tbody td { padding: 14px 14px; font-size: 0.875rem; vertical-align: middle; }
    .car-thumb { width: 64px; height: 48px; border-radius: 6px; object-fit: cover; background: #181818; }

    /* ── Modal overlay ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      z-index: 100; display: flex; align-items: flex-start; justify-content: center;
      padding: 24px; overflow-y: auto; display: none;
    }
    #modal-overlay.open { display: flex; }
    .modal-card {
      width: 100%; max-width: 780px; background: #111; border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px; padding: 36px; box-shadow: 0 32px 80px rgba(0,0,0,0.60);
      margin: auto;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 200;
      padding: 14px 20px; border-radius: 10px; font-size: 0.875rem; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.40);
      transform: translateY(80px); opacity: 0; transition: transform 300ms ease, opacity 300ms ease;
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #1a3a1a; border: 1px solid rgba(40,200,80,0.25); color: #6ddd6d; }
    #toast.error   { background: #3a1a1a; border: 1px solid rgba(192,15,8,0.35);  color: #ff7b75; }

    /* ── Confirm dialog ── */
    #confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
      z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px;
    }
    #confirm-overlay.open { display: flex; }
    .confirm-card {
      background: #111; border: 1px solid rgba(255,255,255,0.10); border-radius: 16px; padding: 32px 28px;
      max-width: 380px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.60);
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 99px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.04em;
    }
    .badge-green { background: rgba(40,180,80,0.15); color: #5de87c; }
    .badge-gray  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.40); }
    .badge-red   { background: rgba(192,15,8,0.15); color: #ff7b75; }

    /* ── Login inputs ── */
    .login-input {
      width: 100%; background: #1c1c1c; border: 1px solid rgba(255,255,255,0.10);
      color: #e8e6e4; font-family: 'Inter', sans-serif; font-size: 0.9375rem;
      padding: 12px 14px; border-radius: 10px; transition: border-color 200ms ease;
    }
    .login-input:focus { outline: none; border-color: rgba(192,15,8,0.60); }
    .login-input::placeholder { color: rgba(255,255,255,0.25); }
    .login-error { color: #ff7b75; font-size: 0.8125rem; margin-top: 10px; display: none; }

    @media (max-width: 640px) {
      .form-grid-2 { grid-template-columns: 1fr; }
      .form-grid-3 { grid-template-columns: 1fr 1fr; }
      .hide-mobile { display: none; }
      .modal-card { padding: 24px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════
     LOADING (auth check)
════════════════════════════════════════ -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
  <p style="font-size:0.8125rem;color:rgba(255,255,255,0.25);">Vérification…</p>
</div>

<!-- ═══════════════════════════════════════
     APP
════════════════════════════════════════ -->
<div id="app">

  <!-- Topbar -->
  <header class="topbar">
    <a href="index.html" class="topbar-logo">AZF<span> AUTO</span> <span style="font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:500;color:rgba(255,255,255,0.30);margin-left:8px;letter-spacing:0;">Admin</span></a>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="nos-vehicules.html" target="_blank" class="btn btn-ghost btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Voir le site
      </a>
      <button onclick="doLogout()" class="btn btn-ghost btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </header>

  <!-- Main content -->
  <div class="main-wrap">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:32px;">
      <div>
        <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin:0 0 4px;">Gestion du stock</h1>
        <p id="stock-subtitle" style="font-size:0.875rem;color:rgba(255,255,255,0.35);margin:0;"></p>
      </div>
      <button onclick="openAddModal()" class="btn btn-red">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter un véhicule
      </button>
    </div>

    <!-- Stats row -->
    <div id="stats-row" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;"></div>

    <!-- Search admin -->
    <div style="position:relative;margin-bottom:20px;">
      <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.25);pointer-events:none;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="admin-search" type="text" placeholder="Rechercher dans le stock…"
             style="width:100%;background:#181818;border:1px solid rgba(255,255,255,0.10);color:#e8e6e4;font-family:'Inter',sans-serif;font-size:0.875rem;padding:10px 12px 10px 42px;border-radius:8px;transition:border-color 200ms ease;"
             oninput="renderTable()" onfocus="this.style.borderColor='rgba(192,15,8,0.55)'" onblur="this.style.borderColor='rgba(255,255,255,0.10)'" />
    </div>

    <!-- Table -->
    <div style="background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden;overflow-x:auto;">
      <table class="car-table">
        <thead>
          <tr>
            <th></th>
            <th>Véhicule</th>
            <th class="hide-mobile">Carburant</th>
            <th>Prix</th>
            <th class="hide-mobile">Km</th>
            <th class="hide-mobile">Année</th>
            <th>Statut</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="car-tbody"></tbody>
      </table>
      <div id="empty-state" style="display:none;padding:60px 24px;text-align:center;">
        <p style="font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;color:rgba(255,255,255,0.20);margin:0 0 8px;">Aucun véhicule</p>
        <p style="font-size:0.875rem;color:rgba(255,255,255,0.18);margin:0 0 20px;">Ajoutez votre premier véhicule au stock.</p>
        <button onclick="openAddModal()" class="btn btn-red">Ajouter un véhicule</button>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL ADD / EDIT
════════════════════════════════════════ -->
<div id="modal-overlay">
  <div class="modal-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <h2 id="modal-title" style="font-family:'Barlow Condensed',sans-serif;font-size:1.625rem;font-weight:700;color:#fff;letter-spacing:-0.02em;margin:0;"></h2>
      <button onclick="closeModal()" style="background:none;border:1px solid rgba(255,255,255,0.12);border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.50);transition:all 150ms ease;" onmouseover="this.style.borderColor='rgba(255,255,255,0.35)';this.style.color='#fff'" onmouseout="this.style.borderColor='rgba(255,255,255,0.12)';this.style.color='rgba(255,255,255,0.50)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form id="car-form" onsubmit="return false;">
      <input type="hidden" id="f-id" />

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;">
        <div class="form-group" style="margin:0">
          <label class="form-label">Marque *</label>
          <input id="f-marque" class="form-input" type="text" placeholder="ex: Renault" required />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Modèle *</label>
          <input id="f-modele" class="form-input" type="text" placeholder="ex: Clio V" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Version</label>
        <input id="f-version" class="form-input" type="text" placeholder="ex: Intens · 2021" />
      </div>

      <div class="form-grid-3" style="margin-bottom:18px;">
        <div class="form-group" style="margin:0">
          <label class="form-label">Prix (€) *</label>
          <input id="f-prix" class="form-input" type="number" min="0" placeholder="19900" required />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Kilométrage *</label>
          <input id="f-km" class="form-input" type="number" min="0" placeholder="45000" required />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Année *</label>
          <input id="f-annee" class="form-input" type="number" min="1900" max="2099" placeholder="2022" required />
        </div>
      </div>

      <div class="form-grid-2" style="margin-bottom:18px;">
        <div class="form-group" style="margin:0">
          <label class="form-label">Carburant</label>
          <select id="f-carburant" class="form-select">
            <option value="Essence">Essence</option>
            <option value="Diesel">Diesel</option>
            <option value="Hybride">Hybride</option>
            <option value="Hybride rechargeable">Hybride rechargeable</option>
            <option value="Électrique">Électrique</option>
            <option value="GPL">GPL</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Transmission</label>
          <select id="f-transmission" class="form-select">
            <option value="Manuelle">Manuelle</option>
            <option value="Manuelle 5v">Manuelle 5v</option>
            <option value="Manuelle 6v">Manuelle 6v</option>
            <option value="Automatique">Automatique</option>
            <option value="Automatique EAT6">Automatique EAT6</option>
            <option value="Automatique EAT8">Automatique EAT8</option>
            <option value="CVT">CVT</option>
          </select>
        </div>
      </div>

      <div class="form-grid-2" style="margin-bottom:18px;">
        <div class="form-group" style="margin:0">
          <label class="form-label">Motorisation</label>
          <input id="f-motorisation" class="form-input" type="text" placeholder="ex: 1.5 TCe 130 cv" />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Couleur</label>
          <input id="f-couleur" class="form-input" type="text" placeholder="ex: Blanc nacré" />
        </div>
      </div>

      <div class="form-grid-3" style="margin-bottom:18px;">
        <div class="form-group" style="margin:0">
          <label class="form-label">Portes</label>
          <select id="f-portes" class="form-select">
            <option value="3">3 portes</option>
            <option value="5" selected>5 portes</option>
            <option value="2">2 portes</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">CO2 (g/km)</label>
          <input id="f-co2" class="form-input" type="text" placeholder="ex: 118 g/km" />
        </div>
        <div class="form-group" style="margin:0">
          <label class="form-label">Référence</label>
          <input id="f-ref" class="form-input" type="text" placeholder="ex: AZF-001" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Photos du véhicule</label>
        <div class="img-upload-zone" id="img-upload-zone">
          <div class="img-preview-grid" id="img-preview-grid"></div>
          <label class="img-upload-trigger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Ajouter des photos
            <input type="file" id="f-imgs-input" accept="image/jpeg,image/png,image/webp" multiple style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;" />
          </label>
          <p class="img-upload-status" id="img-upload-status"></p>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Options (une par ligne)</label>
        <textarea id="f-options" class="form-textarea" placeholder="Climatisation automatique&#10;Navigation GPS&#10;Caméra de recul"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="f-description" class="form-textarea" style="min-height:100px;" placeholder="Description du véhicule…"></textarea>
      </div>

      <div style="display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:rgba(255,255,255,0.65);font-weight:500;">
          <input id="f-disponible" type="checkbox" checked style="width:16px;height:16px;accent-color:#c00f08;cursor:pointer;" />
          Disponible à la vente
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;color:rgba(255,255,255,0.65);font-weight:500;">
          <input id="f-nouveaute" type="checkbox" style="width:16px;height:16px;accent-color:#c00f08;cursor:pointer;" />
          Marquer comme nouveauté
        </label>
      </div>

      <div style="display:flex;gap:12px;justify-content:flex-end;flex-wrap:wrap;">
        <button type="button" onclick="closeModal()" class="btn btn-ghost">Annuler</button>
        <button type="button" onclick="submitForm()" class="btn btn-red" id="submit-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="submit-btn-label">Enregistrer</span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════════════
     CONFIRM DELETE
════════════════════════════════════════ -->
<div id="confirm-overlay">
  <div class="confirm-card">
    <div style="width:48px;height:48px;background:rgba(255,95,88,0.12);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ff5f58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:1.375rem;font-weight:700;color:#fff;margin:0 0 8px;">Supprimer le véhicule ?</h3>
    <p id="confirm-text" style="font-size:0.875rem;color:rgba(255,255,255,0.45);margin:0 0 24px;"></p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button onclick="closeConfirm()" class="btn btn-ghost">Annuler</button>
      <button id="confirm-ok-btn" onclick="confirmDelete()" class="btn btn-danger">Supprimer</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════
     JS
════════════════════════════════════════ -->
<script>
(function(){
'use strict';

/* ═══════════ CONFIG ═══════════ */
var ALL_CARS    = [];
var pendingDeleteId = null;
var currentImgs = [];
var isUploading = false;

/* ═══════════ AUTH ═══════════ */
function getToken() { return localStorage.getItem('azf_token') || ''; }

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
}

window.doLogout = function() {
  fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() } });
  localStorage.removeItem('azf_token');
  localStorage.removeItem('azf_user');
  window.location.href = 'login.html';
};

/* ═══════════ IMAGE UPLOAD ═══════════ */
function renderImgPreviews() {
  var grid = document.getElementById('img-preview-grid');
  grid.innerHTML = currentImgs.map(function(p, idx) {
    return '<div class="img-preview-item">'
      + '<img src="/' + esc(p) + '" alt="" loading="lazy" onerror="this.parentNode.style.background=\'#2a1a1a\'">'
      + '<button class="img-remove-btn" onclick="removeImg(' + idx + ')" title="Supprimer" type="button">'
      + '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      + '</button></div>';
  }).join('');
}

window.removeImg = function(idx) { currentImgs.splice(idx, 1); renderImgPreviews(); };

function setupImgUpload() {
  var input = document.getElementById('f-imgs-input');
  var zone  = document.getElementById('img-upload-zone');
  input.addEventListener('change', function() {
    if (input.files && input.files.length) { uploadFiles(Array.from(input.files)); input.value = ''; }
  });
  zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function()  { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag-over');
    var files = Array.from(e.dataTransfer.files).filter(function(f){ return f.type.startsWith('image/'); });
    if (files.length) uploadFiles(files);
  });
}

async function uploadFiles(files) {
  if (isUploading) return;
  isUploading = true;
  var status  = document.getElementById('img-upload-status');
  var trigger = document.querySelector('.img-upload-trigger');
  trigger.style.pointerEvents = 'none'; trigger.style.opacity = '0.5';
  status.textContent = 'Téléchargement en cours…'; status.className = 'img-upload-status uploading';

  var oversized = files.filter(function(f){ return f.size > 10 * 1024 * 1024; });
  if (oversized.length) {
    status.textContent = oversized.map(function(f){ return f.name; }).join(', ') + ' : trop volumineux (max 10 Mo).';
    status.className = 'img-upload-status error';
    trigger.style.pointerEvents = ''; trigger.style.opacity = ''; isUploading = false; return;
  }
  var fd = new FormData();
  files.forEach(function(f) { fd.append('images', f); });
  try {
    var r = await fetch('/api/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd });
    var result = await r.json();
    if (!r.ok) {
      status.textContent = result.error || 'Erreur.'; status.className = 'img-upload-status error';
    } else {
      result.paths.forEach(function(p){ currentImgs.push(p); });
      renderImgPreviews();
      if (result.errors && result.errors.length) {
        status.textContent = result.errors.join(' '); status.className = 'img-upload-status error';
      } else {
        status.textContent = result.paths.length + ' photo(s) ajoutée(s).'; status.className = 'img-upload-status';
        setTimeout(function(){ status.textContent = ''; }, 3000);
      }
    }
  } catch(e) { status.textContent = 'Erreur réseau.'; status.className = 'img-upload-status error'; }
  trigger.style.pointerEvents = ''; trigger.style.opacity = ''; isUploading = false;
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setupImgUpload();
  loadCars();
}

/* Vérification token admin au chargement */
(function checkAuth() {
  var token = getToken();
  if (!token) { window.location.href = 'login.html?redirect=admin.html'; return; }
  fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.user || d.user.role !== 'admin') {
        window.location.href = 'login.html?redirect=admin.html';
      } else {
        showApp();
      }
    })
    .catch(function() { window.location.href = 'login.html?redirect=admin.html'; });
})();

/* ═══════════ DATA ═══════════ */
async function loadCars() {
  try {
    var r    = await fetch('/api/cars');
    ALL_CARS = await r.json();
    renderStats();
    renderTable();
  } catch(e) {
    showToast('Impossible de contacter le serveur. Lancez node serve.mjs.', 'error');
  }
}

/* ═══════════ STATS ═══════════ */
function renderStats() {
  var total    = ALL_CARS.length;
  var dispo    = ALL_CARS.filter(c => c.disponible !== false).length;
  var prices   = ALL_CARS.map(c => c.prix).filter(Boolean);
  var avgPrix  = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
  var marques  = new Set(ALL_CARS.map(c => c.marque));

  document.getElementById('stock-subtitle').textContent = total + ' véhicule' + (total > 1 ? 's' : '') + ' en base de données';

  var stats = [
    { label: 'Total', value: total, icon: '🚗', color: '#c00f08' },
    { label: 'Disponibles', value: dispo, icon: '✅', color: '#5de87c' },
    { label: 'Prix moyen', value: fmtPrix(avgPrix), icon: '💶', color: '#f0c040' },
    { label: 'Marques', value: marques.size, icon: '🏷', color: '#7fa8ff' },
  ];

  var row = document.getElementById('stats-row');
  row.innerHTML = stats.map(function(s) {
    return '<div style="background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px 20px;">'
      + '<p style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.30);font-weight:600;margin:0 0 8px;">' + s.label + '</p>'
      + '<p style="font-family:\'Barlow Condensed\',sans-serif;font-size:1.75rem;font-weight:800;color:' + s.color + ';margin:0;letter-spacing:-0.02em;">' + s.value + '</p>'
      + '</div>';
  }).join('');
}

/* ═══════════ TABLE ═══════════ */
window.renderTable = function() {
  var q     = (document.getElementById('admin-search').value || '').toLowerCase();
  var cars  = ALL_CARS.filter(function(c) {
    if (!q) return true;
    return [c.marque, c.modele, c.version, c.ref, c.carburant].join(' ').toLowerCase().includes(q);
  });

  var tbody = document.getElementById('car-tbody');
  var empty = document.getElementById('empty-state');

  if (cars.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = cars.map(function(c) {
    var img     = (c.imgs && c.imgs[0]) ? c.imgs[0] : '';
    var badge   = c.disponible !== false
      ? '<span class="badge badge-green">Disponible</span>'
      : '<span class="badge badge-gray">Archivé</span>';
    return '<tr>'
      + '<td style="width:80px;">' + (img ? '<img class="car-thumb" src="' + esc(img) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '<div class="car-thumb" style="background:#1c1c1c;"></div>') + '</td>'
      + '<td><span style="font-weight:600;color:#e8e6e4;">' + esc(c.marque) + ' ' + esc(c.modele) + '</span><br><span style="font-size:0.8125rem;color:rgba(255,255,255,0.35);">' + esc(c.version || '—') + '</span></td>'
      + '<td class="hide-mobile" style="color:rgba(255,255,255,0.55);">' + esc(c.carburant || '—') + '</td>'
      + '<td style="font-weight:600;color:#c00f08;white-space:nowrap;">' + fmtPrix(c.prix) + '</td>'
      + '<td class="hide-mobile" style="color:rgba(255,255,255,0.55);white-space:nowrap;">' + (c.km ? fmtKm(c.km) : '—') + '</td>'
      + '<td class="hide-mobile" style="color:rgba(255,255,255,0.55);">' + (c.annee || '—') + '</td>'
      + '<td>' + badge + '</td>'
      + '<td style="text-align:right;">'
      + '<div style="display:flex;gap:6px;justify-content:flex-end;">'
      + '<button onclick="openEditModal(\'' + esc(c.id) + '\')" class="btn btn-ghost btn-sm" title="Modifier">'
      + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'
      + ' Modifier</button>'
      + '<button onclick="askDelete(\'' + esc(c.id) + '\')" class="btn btn-danger btn-sm" title="Supprimer">'
      + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>'
      + '</button>'
      + '</div>'
      + '</td>'
      + '</tr>';
  }).join('');
};

/* ═══════════ MODAL ═══════════ */
window.openAddModal = function() {
  document.getElementById('modal-title').textContent = 'Ajouter un véhicule';
  document.getElementById('submit-btn-label').textContent = 'Ajouter';
  clearForm();
  document.getElementById('f-disponible').checked = true;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.openEditModal = function(id) {
  var car = ALL_CARS.find(c => c.id === id);
  if (!car) return;
  document.getElementById('modal-title').textContent = 'Modifier — ' + car.marque + ' ' + car.modele;
  document.getElementById('submit-btn-label').textContent = 'Enregistrer';
  fillForm(car);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeModal = function() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
};

function clearForm() {
  ['f-id','f-marque','f-modele','f-version','f-prix','f-km','f-annee','f-motorisation','f-couleur','f-co2','f-ref','f-options','f-description'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-carburant').value   = 'Essence';
  document.getElementById('f-transmission').value = 'Manuelle';
  document.getElementById('f-portes').value       = '5';
  document.getElementById('f-disponible').checked = true;
  document.getElementById('f-nouveaute').checked  = false;
  currentImgs = []; renderImgPreviews();
  document.getElementById('img-upload-status').textContent = '';
  document.getElementById('img-upload-status').className = 'img-upload-status';
}

function fillForm(car) {
  document.getElementById('f-id').value          = car.id || '';
  document.getElementById('f-marque').value       = car.marque || '';
  document.getElementById('f-modele').value       = car.modele || '';
  document.getElementById('f-version').value      = car.version || '';
  document.getElementById('f-prix').value         = car.prix || '';
  document.getElementById('f-km').value           = car.km || '';
  document.getElementById('f-annee').value        = car.annee || '';
  document.getElementById('f-motorisation').value = car.motorisation || '';
  document.getElementById('f-couleur').value      = car.couleur || '';
  document.getElementById('f-co2').value          = car.co2 || '';
  document.getElementById('f-ref').value          = car.ref || '';
  document.getElementById('f-carburant').value    = car.carburant || 'Essence';
  document.getElementById('f-transmission').value = car.transmission || 'Manuelle';
  document.getElementById('f-portes').value       = String(car.portes || 5);
  currentImgs = (car.imgs || []).slice(); renderImgPreviews();
  document.getElementById('f-options').value      = (car.options || []).join('\n');
  document.getElementById('f-description').value  = car.description || '';
  document.getElementById('f-disponible').checked = car.disponible !== false;
  document.getElementById('f-nouveaute').checked  = !!car.nouveaute;
}

function readForm() {
  var imgs    = currentImgs.slice();
  var options = document.getElementById('f-options').value.split('\n').map(s => s.trim()).filter(Boolean);
  var id      = document.getElementById('f-id').value.trim();
  if (!id) {
    var m = document.getElementById('f-marque').value.trim();
    var mo = document.getElementById('f-modele').value.trim();
    id = slugify(m + '-' + mo + '-' + Date.now());
  }
  return {
    id,
    marque:        document.getElementById('f-marque').value.trim(),
    modele:        document.getElementById('f-modele').value.trim(),
    version:       document.getElementById('f-version').value.trim(),
    prix:          parseInt(document.getElementById('f-prix').value) || 0,
    km:            parseInt(document.getElementById('f-km').value)   || 0,
    annee:         parseInt(document.getElementById('f-annee').value) || 0,
    carburant:     document.getElementById('f-carburant').value,
    transmission:  document.getElementById('f-transmission').value,
    couleur:       document.getElementById('f-couleur').value.trim(),
    portes:        parseInt(document.getElementById('f-portes').value) || 5,
    co2:           document.getElementById('f-co2').value.trim(),
    motorisation:  document.getElementById('f-motorisation').value.trim(),
    ref:           document.getElementById('f-ref').value.trim(),
    imgs,
    options,
    description:   document.getElementById('f-description').value.trim(),
    disponible:    document.getElementById('f-disponible').checked,
    nouveaute:     document.getElementById('f-nouveaute').checked,
  };
}

window.submitForm = async function() {
  var data = readForm();
  if (!data.marque || !data.modele) { showToast('Marque et modèle sont obligatoires.', 'error'); return; }
  if (!data.prix)    { showToast('Le prix est obligatoire.', 'error'); return; }

  var btn   = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.querySelector('#submit-btn-label').textContent = 'Enregistrement…';

  var existing = ALL_CARS.find(c => c.id === data.id);

  try {
    var url    = '/api/cars' + (existing ? '/' + data.id : '');
    var method = existing ? 'PUT' : 'POST';
    var r      = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(data) });
    if (!r.ok) throw new Error('API error ' + r.status);
    await loadCars();
    closeModal();
    showToast(existing ? 'Véhicule modifié !' : 'Véhicule ajouté !', 'success');
  } catch(e) {
    showToast('Erreur lors de l\'enregistrement.', 'error');
  }

  btn.disabled = false;
  document.getElementById('submit-btn-label').textContent = existing ? 'Enregistrer' : 'Ajouter';
};

/* ═══════════ DELETE ═══════════ */
window.askDelete = function(id) {
  var car = ALL_CARS.find(c => c.id === id);
  pendingDeleteId = id;
  document.getElementById('confirm-text').textContent = car ? (car.marque + ' ' + car.modele + ' — ' + fmtPrix(car.prix)) : id;
  document.getElementById('confirm-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
};

window.closeConfirm = function() {
  document.getElementById('confirm-overlay').classList.remove('open');
  document.body.style.overflow = '';
  pendingDeleteId = null;
};

window.confirmDelete = async function() {
  if (!pendingDeleteId) return;
  var id = pendingDeleteId;
  closeConfirm();
  try {
    var r = await fetch('/api/cars/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + getToken() } });
    if (!r.ok) throw new Error();
    await loadCars();
    showToast('Véhicule supprimé.', 'success');
  } catch(e) {
    showToast('Erreur lors de la suppression.', 'error');
  }
};

/* ═══════════ TOAST ═══════════ */
var toastTimer;
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + (type || 'success');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

/* ═══════════ UTILS ═══════════ */
function fmtPrix(n) { return n ? n.toLocaleString('fr-FR') + ' €' : '—'; }
function fmtKm(n)   { return n ? n.toLocaleString('fr-FR') + ' km' : '—'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function slugify(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

/* close modal on overlay click */
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('confirm-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

})();
</script>

</body>
